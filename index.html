<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web-application</title>
    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <div id="container">
        <div id="page">
            <div id="login">
                <h1>Login </h1>

                <form action="" id="login_form">
                    <input type="text" name="" id="login_email" placeholder="Email Id">

                    <input type="password" name="" id="login_password" placeholder="Password">

                    <button type="submit" id="login_btn">Login</button>
                </form>
                <p>Don't have an account ? <span> Sign up</span></p>
            </div>

            <div id="sign-up">
                <h1>Sign Up</h1>

                <form action="" id="signup_form">
                    <input type="text" name="" id="username" placeholder="Enter name">

                    <input type="email" name="" id="email" placeholder="Enter email">

                    <input type="tel" name="" id="phone" placeholder="Enter phone no. ">

                    <input type="password" name="" id="password" placeholder="Enter password">
                </form>
                <button type="submit" id="signup_btn">Sign up</button>
                <p>Already have an account ? <span> Login</span></p>
            </div>
        </div>
    </div>

</body>

</html>
