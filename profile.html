<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./profile.css">
</head>

<body>
    <div id="container">
        <div id="page_cover">
            <div id="profile_box">
                <div id="profile_pic">
                    <i class="fas fa-user" id="profile_icon"></i>
                    <input type="file" name="" id="profile_upload" accept="image/*">
                </div>
                <p id="upp">Upload Profile Pic</p>
                <h3 id="profile_name"></h3>
                <button id="next">Next <i class="fa-solid fa-angles-right"></i></button>
            </div>
        </div>

    </div>

    <div id="main_profile_page">
        <div id="profile_header">
            <div id="profile_picture"></div>
        </div>
        <h1 id="profile_username"></h1>

        <div id="app">
            <a href="./apps/contact/contact.html">
                <div id="contact">
                    <i class="fas fa-address-book"></i>
                    <p>Contact</p>
                </div>
            </a>
            <div id="player">
                <i class="fas fa-play-circle"></i>
                <p>Player</p>
            </div>
            <div id="logout">
                <i class="fas fa-sign-out-alt"></i>
                <p id="logout_text">Logout</p>
            </div>
        </div>

        <div id="profile_footer">
            <p>Developed By: Intiyaj Raj</p>
        </div>
    </div>




    <script src="./profile.js"></script>
</body>

</html>
