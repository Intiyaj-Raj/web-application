<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #page_cover {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #2c3e50, #bdc3c7);
        }

        #profile_box {
            width: 300px;
            height: auto;
            background: rgb(255, 255, 255, .3);
            box-shadow: 0px 0px 0px 2px #ccc;
            border-radius: 6px;
            padding: 30px 20px;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #profile_pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ccc;
            box-shadow: 0 0 10px #ccc;
            position: relative;
            overflow: hidden;
        }

        #profile_icon {
            color: #ccc;
            font-size: 110px;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translate(-50%);
        }

        #profile_upload {
            width: 100%;
            height: 100%;
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 50%;
        }

        #upp {

            font-size: 20px;
            color: rgb(52, 49, 49);
            font-family: sans-serif;
            margin: 15px 0 8px 0;
        }

        #next {
            width: 100%;
            padding: 10px;
            border: none;
            outline: none;
            background: linear-gradient(to right, #E100FF, #7F00FF);
            color: white;
            font-weight: bold;
            margin-top: 30px;
            cursor: pointer;
            border-radius: 0 0 5px 5px;
        }
    </style>
</head>

<body>
    <div id="page_cover">
        <div id="profile_box">
            <div id="profile_pic">
                <i class="fas fa-user" id="profile_icon"></i>
                <input type="file" name="" id="profile_upload" accept="image/*">
            </div>
            <p id="upp">Upload Profile Pic</p>
            <h3>Intiyaj Raj</h3>
            <button id="next">Next <i class="fa-solid fa-angles-right"></i></button>
        </div>
    </div>

    <script>

    </script>
</body>

</html>
